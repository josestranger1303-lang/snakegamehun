<!DOCTYPE html>

<html lange="pt-br"></HTML>
    <head>
       <meta charset="UTF-8">
         <!--
              <meta charset> Define o conjunto de caracteres (enconding) 
              da pagina. UTF-8 garante que acertos e caracteres especiais
               apareçam corretamente.
         -->
         <meta name="viewport" contente="width=device-width, initial-scale=1.0">

         <!--
         <meta viewport>:  esta tag é importante para sites de devem funcionar
         em dispositivos móveis (celular). width-device  -> garante que a 
         largura da página vai ser adaptar á largura do dispositivo.
         initial-scale=1 -> não aplica zoom automático ao abrir a página.
         Sem ela o celular vai tentar mostrar a página como se fosse no computador
         -->
        <title>Jogo da Cobrinha</title>

        <!--
        Estilos e CSS vão ficar abaixo desta linha - Próxima aula
        -->

        <style>

            .container{
                text-align: center;
                background-color: rgba(253, 129, 226, 0.842);
                padding: 30px;
                border-radius: 20px;
                box-shadow: 0px 10px 30px rgb(255, 230, 0);
            }
 
            .info{
                font-size: 1em:
            }

            .pontuacao{
               font-weight: bold;
               color:rgb(255, 221, 30);
            }

            #canvas{
                border: 3px solid #da10ae;
                border-radius: 10px;
                background-color: rgb(255, 228, 74);
                display: block;

                margin: 20px auto;
                box-shadow: 0px 5px 15px rgba(255, 239, 22, 0.2);

            }

            .controles {
                margin-top: 20px;
            }

            button{
        
                font-size: 16px;
                cursor: pointer;
                background-color:rgb(255, 238, 0);
              
                padding: 12px 25px;
                color: rgb(255, 0, 170);
                border: none;
                border-radius: 8px;
                margin: 5px;
                transition: all 0.3s ease;
            }
            
            .teclas{
                display: grid;
                grid-template-columns: repeat(3, 50px);
                gap: 5px;
                justify-content: center;
                margin: 15px auto;
            }
            
            .tecla{
                width: 50px;
                height: 50px;
                background-color:#da10ae;
                color:rgb(243, 220, 87);
                border: none;
                cursor: pointer;
                border-radius: 5px;
                font-size: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
            }

            .tecla:active{
                background-color: #ffdd19;
            }

            .tecla.vazio{
                background-color: transparent;
                cursor: default;
            }

            .instrucoes {
                margin-top: 20px;
                padding: 15px;
                background-color: #eca4dd;
                border-radius: 10px;
                font-size: 14px;
                color:#ffdd19
            }

            .instrucoes h3 {
                margin-bottom: 10px;
                color:rgb(255, 218, 10)
            }


            @media (max-width: 600px){
                h1{
                    font-size: 1.8em;
                }
                .info{
                    font-size: 1em;
                }
            }



        </style>

    </head>
    <body> 

        <div   class="container">
           <h1>    💝🌸 Jogo da Cobrinha 🫦💘​ </h1>

            <div class="info"> 

             <div class="pontuacao"> 
                 Pontuação: <span id="pontos"> 0 </span>
              </div>

             <div class="recorde"> 
                Recorde: <span id="recorde"> 0 </span>
           </div>

           </div>

           <canvas id="canvas" widht="400" height="400">
              <!--
            
             <canvas>: é um elemento especial para desenho 2D ou 3D. Por si só, 
             é apenas um retângulo vazio. O JavasScript vai usar o "contexto 2D"
             para desenhar a cobra, e comida, etc   


              -->

           </canvas>


           <div  class="controles">


                <button onclick="alert('Em construção')">Iniciar Jogo</button>

                <button>Pausar / Continuar</button>

           </div>

           <div class="teclas">
               
               <div class="tecla vazio"></div>

               <div class="tecla" onclick="mudarDirecao('cima')">&#9650;</div>

               <div class="tecla vazio"></div>

               <div class="tecla" "mudarDirecao('esquerda')">&#9668;</div>
               <div class="tecla" "mudarDirecao('baixo')">&#9660;</div>
               <div class="tecla" "mudarDirecao('direita')">&#9658;</div>
               
           </div>

        </div class="instrucoes">

        <h3>Como jogar:</h3>
        <p>Use as setas do teclado ou os botões acima para controlar a cobra</p>
        <p>Coma as maçãs vermelhas &#127822; para crescer e ganhar pontos</p>
        <p>Não bata nas paredes nem no próprio corpo</p>

        </div>
              
           </div>

<script>

function mudarDirecao(novaDirecao){
    console.log(novaDirecao)
}
 
function iniciarJogo(){
    console.log("Jogo sapeca começou!!!");
 }

 function pausarJogo(){
    console.log("Pausa na sapecagem!!");
 }

</script>

    </body>
          
</html>
