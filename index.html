<!DOCTYPE html>

<html lange="pt-br"></HTML>
    <head>
       <meta charset="UTF-8">
         <!--
              <meta charset> Define o conjunto de caracteres (enconding) 
              da pagina. UTF-8 garante que acertos e caracteres especiais
               apareçam corretamente.
         -->
         <meta name="viewport" contente="width=device-width, initial-scale=1.0">

         <!--
         <meta viewport>:  esta tag é importante para sites de devem funcionar
         em dispositivos móveis (celular). width-device  -> garante que a 
         largura da página vai ser adaptar á largura do dispositivo.
         initial-scale=1 -> não aplica zoom automático ao abrir a página.
         Sem ela o celular vai tentar mostrar a página como se fosse no computador
         -->
        <title>Jogo da Cobrinha</title>
